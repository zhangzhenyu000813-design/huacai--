<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-primary:              #1a3a5c;
      --color-primary-container:    #d5e3f0;
      --color-on-primary:           #ffffff;
      --color-secondary:            #2db8a0;
      --color-on-secondary:         #ffffff;
      --color-background:                 #f5f7fa;
      --color-surface-container-lowest:   #ffffff;
      --color-surface:                    #ffffff;
      --color-surface-container:          #eef0f4;
      --color-surface-container-high:     #e5e7eb;
      --color-surface-container-highest:  #d1d5db;
      --color-on-surface:           #1a202c;
      --color-on-surface-variant:   #718096;
      --color-success:  #2db8a0;
      --color-error:    #ef4444;
      --color-warning:  #eab308;
      --color-outline:          #d1d5db;
      --color-outline-variant:  #e5e7eb;
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      --shadow-card:   0 2px 8px rgba(0,0,0,0.08);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.12);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.18);
      --font-sans: system-ui, -apple-system, sans-serif;
    }
    ::-webkit-scrollbar { display: none; }
    body { min-height: 100dvh; font-family: system-ui, sans-serif; background: #e8eaed; display: flex; justify-content: center; margin: 0; }
    .mobile-frame { width: 393px; min-height: 100dvh; background: var(--color-background); margin: 0 auto; position: relative; overflow-x: hidden; }
    @media (max-width: 430px) { body { background: var(--color-background); } .mobile-frame { width: 100%; } }
  </style>

  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">
<div class="mobile-frame">

  <!-- @nav:start -->
  <header class="bg-background sticky top-0 z-40 h-14 flex items-center justify-between px-4 border-b border-outline-variant/30">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center">
        <i data-lucide="user" class="w-4 h-4 text-white"></i>
      </div>
      <h1 class="text-lg font-bold text-primary">个人中心</h1>
    </div>
    <button class="w-10 h-10 flex items-center justify-center text-on-surface-variant rounded-full hover:bg-surface-container transition-colors">
      <i data-lucide="settings" class="w-5 h-5"></i>
    </button>
  </header>

  <div class="app-scroll">
    <!-- @main-content:start -->

    <!-- 个人信息卡片 -->
    <div class="px-4 pt-4 pb-4">
      <div class="rounded-xl bg-surface shadow-card p-5">
        <div class="flex items-center gap-4">
          <div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center text-2xl font-bold text-white">
            丰
          </div>
          <div class="flex-1">
            <div class="flex items-center gap-2">
              <h2 class="text-lg font-bold text-on-surface">丰远渔业有限公司</h2>
              <span class="text-xs bg-success/10 text-success px-2 py-0.5 rounded-full font-medium flex items-center gap-0.5">
                <i data-lucide="badge-check" class="w-3 h-3"></i>
                已认证
              </span>
            </div>
            <p class="text-sm text-on-surface-variant mt-1">船东 · 舟山港</p>
            <p class="text-xs text-on-surface-variant mt-0.5">加入时间：2024年3月</p>
          </div>
        </div>
        <div class="grid grid-cols-3 gap-4 mt-4 pt-4 border-t border-outline-variant/20">
          <div class="text-center">
            <p class="text-lg font-bold text-primary">12</p>
            <p class="text-xs text-on-surface-variant mt-0.5">在库品类</p>
          </div>
          <div class="text-center">
            <p class="text-lg font-bold text-primary">21</p>
            <p class="text-xs text-on-surface-variant mt-0.5">分发次数</p>
          </div>
          <div class="text-center">
            <p class="text-lg font-bold text-secondary">¥128.6</p>
            <p class="text-xs text-on-surface-variant mt-0.5">总货值(万)</p>
          </div>
        </div>
      </div>
    </div>

    <!-- 功能列表 -->
    <div class="px-4 pb-3">
      <div class="rounded-xl bg-surface shadow-card divide-y divide-outline-variant/20 overflow-hidden">
        <!-- 货盘管理 -->
        <a href="home.html" class="flex items-center gap-3 px-4 py-4 hover:bg-surface-container/40 transition-colors">
          <div class="w-10 h-10 rounded-xl bg-primary-container flex items-center justify-center">
            <i data-lucide="archive" class="w-5 h-5 text-primary"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-on-surface">货盘管理</p>
            <p class="text-xs text-on-surface-variant mt-0.5">查看和管理我的货盘</p>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-on-surface-variant/50 shrink-0"></i>
        </a>

        <!-- 分发记录 -->
        <a href="distribution.html" class="flex items-center gap-3 px-4 py-4 hover:bg-surface-container/40 transition-colors">
          <div class="w-10 h-10 rounded-xl bg-primary-container flex items-center justify-center">
            <i data-lucide="share-2" class="w-5 h-5 text-primary"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-on-surface">分发记录</p>
            <p class="text-xs text-on-surface-variant mt-0.5">查看货盘分发历史和状态</p>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-on-surface-variant/50 shrink-0"></i>
        </a>

        <!-- 品控报告 -->
        <a href="#" class="flex items-center gap-3 px-4 py-4 hover:bg-surface-container/40 transition-colors" onclick="alert('品控报告页面（开发中）')">
          <div class="w-10 h-10 rounded-xl bg-primary-container flex items-center justify-center">
            <i data-lucide="file-text" class="w-5 h-5 text-primary"></i>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <p class="text-sm font-medium text-on-surface">品控报告</p>
              <span class="text-[10px] bg-secondary/10 text-secondary px-1.5 py-0.5 rounded-full">新</span>
            </div>
            <p class="text-xs text-on-surface-variant mt-0.5">查看品控记录与检测报告</p>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-on-surface-variant/50 shrink-0"></i>
        </a>

        <!-- 设置 -->
        <a href="#" class="flex items-center gap-3 px-4 py-4 hover:bg-surface-container/40 transition-colors" onclick="alert('设置页面（开发中）')">
          <div class="w-10 h-10 rounded-xl bg-primary-container flex items-center justify-center">
            <i data-lucide="settings" class="w-5 h-5 text-primary"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-on-surface">设置</p>
            <p class="text-xs text-on-surface-variant mt-0.5">账号安全、通知、隐私等</p>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-on-surface-variant/50 shrink-0"></i>
        </a>
      </div>
    </div>

    <!-- 联系客服 -->
    <div class="px-4 pb-6">
      <div class="rounded-xl bg-surface shadow-card p-4">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-secondary/10 flex items-center justify-center">
            <i data-lucide="headphones" class="w-5 h-5 text-secondary"></i>
          </div>
          <div class="flex-1">
            <p class="text-sm font-medium text-on-surface">客服中心</p>
            <p class="text-xs text-on-surface-variant mt-0.5">工作日 09:00 - 18:00</p>
          </div>
          <button class="text-xs text-secondary font-medium" onclick="alert('联系客服')">联系客服 →</button>
        </div>
      </div>
    </div>

    <!-- 版本信息 -->
    <div class="px-4 pb-6 text-center">
      <p class="text-xs text-on-surface-variant">船东丰链 v1.0.0</p>
      <p class="text-[10px] text-on-surface-variant/60 mt-1">Copyright © 2024 丰链科技</p>
    </div>

    <!-- @main-content:end -->
  </div>

  <!-- TabBar -->
  <nav class="flex justify-around items-center h-14 shrink-0 bg-surface border-t border-outline-variant/20">
    <a href="home.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant hover:text-on-surface transition-colors">
      <i data-lucide="archive" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold tracking-wide">货盘</span>
    </a>
    <a href="distribution.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant hover:text-on-surface transition-colors">
      <i data-lucide="share-2" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold tracking-wide">分发</span>
    </a>
    <a href="market.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant hover:text-on-surface transition-colors">
      <i data-lucide="trending-up" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold tracking-wide">行情</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-primary" aria-current="page">
      <i data-lucide="user" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold tracking-wide">我的</span>
    </a>
  </nav>

  <script>lucide.createIcons();</script>
</div>
</body>

</html>
