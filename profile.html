<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>我的 - 丰链货盘</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    @theme {
      --color-ios-bg: #F2F2F7; --color-ios-card: #FFFFFF;
      --color-ios-blue: #007AFF; --color-ios-green: #34C759; --color-ios-red: #FF3B30;
      --color-ios-orange: #FF9500; --color-ios-yellow: #FFCC00;
      --color-ios-gray: #8E8E93; --color-ios-gray2: #AEAEB2; --color-ios-gray3: #C7C7CC;
      --color-ios-gray4: #D1D1D6; --color-ios-gray5: #E5E5EA; --color-ios-gray6: #F2F2F7;
      --color-ios-sep: #C6C6C8; --color-ios-label: #1C1C1E; --color-ios-label2: #3C3C43;
      --color-ios-secondary: #8E8E93; --color-ios-tertiary: #AEAEB2;
      --color-ios-sea: #1A3A5C; --color-ios-teal-brand: #2DB8A0;
      --font-sans: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    }
  </style>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: var(--font-sans); }
    body { background: #E8E8ED; display: flex; justify-content: center; }
    .mobile-frame { width: 393px; height: 100dvh; background: #F2F2F7; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .app-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .app-scroll::-webkit-scrollbar { display: none; }
    @media (max-width: 430px) { body { background: #F2F2F7; } .mobile-frame { width: 100%; } }
  </style>
</head>
<body>
<div class="mobile-frame">

  <header class="shrink-0 bg-ios-bg px-5 pt-3 pb-1">
    <h1 class="text-[28px] font-bold text-ios-label tracking-tight">我的</h1>
  </header>

  <div class="app-scroll">
    <div class="px-5 pb-28">

      <!-- 用户卡片 -->
      <div class="bg-ios-card rounded-xl p-4 mt-4">
        <div class="flex items-center gap-4">
          <div class="w-14 h-14 rounded-full bg-ios-sea flex items-center justify-center">
            <span class="text-xl font-bold text-white">陈</span>
          </div>
          <div class="flex-1">
            <div class="flex items-center gap-2">
              <p class="text-lg font-semibold text-ios-label">陈海丰</p>
              <span class="text-xs font-medium text-ios-green bg-ios-green/10 px-2 py-0.5 rounded-full">已认证</span>
            </div>
            <p class="text-sm text-ios-secondary mt-0.5">舟山丰海水产有限公司</p>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-ios-gray3"></i>
        </div>
      </div>

      <!-- 统计 -->
      <div class="flex gap-3 mt-4">
        <div class="flex-1 bg-ios-card rounded-xl p-4 text-center">
          <p class="text-2xl font-bold text-ios-sea">12</p>
          <p class="text-sm text-ios-secondary mt-0.5">品类</p>
        </div>
        <div class="flex-1 bg-ios-card rounded-xl p-4 text-center">
          <p class="text-2xl font-bold text-ios-sea">8,560</p>
          <p class="text-sm text-ios-secondary mt-0.5">总件数</p>
        </div>
        <div class="flex-1 bg-ios-card rounded-xl p-4 text-center">
          <p class="text-2xl font-bold text-ios-sea">20</p>
          <p class="text-sm text-ios-secondary mt-0.5">合作方</p>
        </div>
      </div>

      <!-- 功能列表 -->
      <div class="mt-6">
        <p class="text-sm font-semibold text-ios-secondary uppercase tracking-wider mb-2 px-1">管理</p>
        <div class="bg-ios-card rounded-xl overflow-hidden">
          <a href="home.html" class="flex items-center justify-between px-4 py-3.5 border-b border-ios-gray5/60 active:bg-ios-gray6">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-lg bg-ios-blue/10 flex items-center justify-center"><i data-lucide="package" class="w-4 h-4 text-ios-blue"></i></div>
              <span class="text-base text-ios-label">货盘管理</span>
            </div>
            <div class="flex items-center gap-1"><span class="text-sm text-ios-tertiary">12个品类</span><i data-lucide="chevron-right" class="w-4 h-4 text-ios-gray3"></i></div>
          </a>
          <a href="distribution.html" class="flex items-center justify-between px-4 py-3.5 border-b border-ios-gray5/60 active:bg-ios-gray6">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-lg bg-ios-green/10 flex items-center justify-center"><i data-lucide="send" class="w-4 h-4 text-ios-green"></i></div>
              <span class="text-base text-ios-label">分发记录</span>
            </div>
            <div class="flex items-center gap-1"><span class="text-sm text-ios-tertiary">20条</span><i data-lucide="chevron-right" class="w-4 h-4 text-ios-gray3"></i></div>
          </a>
          <div class="flex items-center justify-between px-4 py-3.5 active:bg-ios-gray6">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-lg bg-ios-orange/10 flex items-center justify-center"><i data-lucide="shield-check" class="w-4 h-4 text-ios-orange"></i></div>
              <span class="text-base text-ios-label">品控报告</span>
            </div>
            <div class="flex items-center gap-1"><span class="text-sm text-ios-tertiary">8份</span><i data-lucide="chevron-right" class="w-4 h-4 text-ios-gray3"></i></div>
          </div>
        </div>
      </div>

      <div class="mt-6">
        <p class="text-sm font-semibold text-ios-secondary uppercase tracking-wider mb-2 px-1">其他</p>
        <div class="bg-ios-card rounded-xl overflow-hidden">
          <div class="flex items-center justify-between px-4 py-3.5 border-b border-ios-gray5/60 active:bg-ios-gray6">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-lg bg-ios-gray6 flex items-center justify-center"><i data-lucide="settings" class="w-4 h-4 text-ios-gray"></i></div>
              <span class="text-base text-ios-label">设置</span>
            </div>
            <i data-lucide="chevron-right" class="w-4 h-4 text-ios-gray3"></i>
          </div>
          <div class="flex items-center justify-between px-4 py-3.5 border-b border-ios-gray5/60 active:bg-ios-gray6">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-lg bg-ios-gray6 flex items-center justify-center"><i data-lucide="help-circle" class="w-4 h-4 text-ios-gray"></i></div>
              <span class="text-base text-ios-label">帮助与反馈</span>
            </div>
            <i data-lucide="chevron-right" class="w-4 h-4 text-ios-gray3"></i>
          </div>
          <div class="flex items-center justify-between px-4 py-3.5 active:bg-ios-gray6">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-lg bg-ios-gray6 flex items-center justify-center"><i data-lucide="info" class="w-4 h-4 text-ios-gray"></i></div>
              <span class="text-base text-ios-label">关于</span>
            </div>
            <div class="flex items-center gap-1"><span class="text-sm text-ios-tertiary">v1.0.0</span><i data-lucide="chevron-right" class="w-4 h-4 text-ios-gray3"></i></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <nav class="shrink-0 flex justify-around items-center h-13 bg-ios-card/80 backdrop-blur-xl border-t border-ios-gray5">
    <a href="home.html" class="flex flex-col items-center gap-0.5 px-3 py-1">
      <i data-lucide="package" class="w-5 h-5 text-ios-gray"></i>
      <span class="text-[10px] font-medium text-ios-gray">货盘</span>
    </a>
    <a href="distribution.html" class="flex flex-col items-center gap-0.5 px-3 py-1">
      <i data-lucide="send" class="w-5 h-5 text-ios-gray"></i>
      <span class="text-[10px] font-medium text-ios-gray">分发</span>
    </a>
    <a href="market.html" class="flex flex-col items-center gap-0.5 px-3 py-1">
      <i data-lucide="trending-up" class="w-5 h-5 text-ios-gray"></i>
      <span class="text-[10px] font-medium text-ios-gray">行情</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-0.5 px-3 py-1">
      <i data-lucide="user" class="w-5 h-5 text-ios-blue"></i>
      <span class="text-[10px] font-medium text-ios-blue">我的</span>
    </a>
  </nav>

</div>
<script>lucide.createIcons();</script>
</body>
</html>
