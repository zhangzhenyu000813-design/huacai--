<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 198">
  <!-- Shield shape -->
  <path d="M90 4 C52 4 18 24 12 60 L8 90 C8 92 8 96 8 100 C8 136 42 166 90 182 C138 166 172 136 172 100 C172 96 172 92 172 90 L168 60 C162 24 128 4 90 4Z" fill="#1B44B5"/>
  <!-- Inner white area -->
  <path d="M90 16 C58 16 30 32 24 62 L20 90 C20 92 20 95 20 98 C20 128 48 154 90 168 C132 154 160 128 160 98 C160 95 160 92 160 90 L156 62 C150 32 122 16 90 16Z" fill="#FFFFFF"/>
  <!-- Gold left vertical bar -->
  <rect x="35" y="48" width="12" height="90" rx="6" fill="#F4BB44"/>
  <!-- Gold right vertical bar -->
  <rect x="123" y="48" width="12" height="90" rx="6" fill="#F4BB44"/>
  <!-- Gold top horizontal bar -->
  <rect x="48" y="50" width="74" height="8" rx="4" fill="#F4BB44"/>
  <!-- Gold bottom horizontal bar -->
  <rect x="48" y="128" width="74" height="8" rx="4" fill="#F4BB44"/>
  <!-- Gold center - two interlocking chain links (representing 链) -->
  <!-- Left link -->
  <rect x="58" y="65" width="28" height="56" rx="14" fill="none" stroke="#F4BB44" stroke-width="7"/>
  <!-- Right link -->
  <rect x="76" y="65" width="28" height="56" rx="14" fill="none" stroke="#F4BB44" stroke-width="7"/>
  <!-- Center vertical connection -->
  <line x1="74" y1="65" x2="88" y2="65" stroke="#F4BB44" stroke-width="7" stroke-linecap="round"/>
  <line x1="74" y1="121" x2="88" y2="121" stroke="#F4BB44" stroke-width="7" stroke-linecap="round"/>
  <!-- Gold horizontal cross bars in middle -->
  <line x1="47" y1="88" x2="123" y2="88" stroke="#F4BB44" stroke-width="7" stroke-linecap="round"/>
</svg>
