<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>货盘总览 - 丰链货盘</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    @theme {
      --color-ios-bg: #F2F2F7;
      --color-ios-card: #FFFFFF;
      --color-ios-blue: #007AFF;
      --color-ios-green: #34C759;
      --color-ios-red: #FF3B30;
      --color-ios-orange: #FF9500;
      --color-ios-yellow: #FFCC00;
      --color-ios-purple: #AF52DE;
      --color-ios-teal: #5AC8FA;
      --color-ios-gray: #8E8E93;
      --color-ios-gray2: #AEAEB2;
      --color-ios-gray3: #C7C7CC;
      --color-ios-gray4: #D1D1D6;
      --color-ios-gray5: #E5E5EA;
      --color-ios-gray6: #F2F2F7;
      --color-ios-sep: #C6C6C8;
      --color-ios-label: #1C1C1E;
      --color-ios-label2: #3C3C43;
      --color-ios-label3: #48484A;
      --color-ios-secondary: #8E8E93;
      --color-ios-tertiary: #AEAEB2;
      --color-ios-sea: #1A3A5C;
      --color-ios-teal-brand: #2DB8A0;
      --font-sans: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    }
  </style>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: var(--font-sans); }
    body { background: #E8E8ED; display: flex; justify-content: center; }
    .mobile-frame { width: 393px; height: 100dvh; background: #F2F2F7; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden; }
    .app-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .app-scroll::-webkit-scrollbar { display: none; }
    @media (max-width: 430px) { body { background: #F2F2F7; } .mobile-frame { width: 100%; } }
  </style>
</head>
<body>
<div class="mobile-frame">

  <header class="shrink-0 bg-ios-bg px-5 pt-3 pb-1">
    <h1 class="text-[28px] font-bold text-ios-label tracking-tight">货盘</h1>
  </header>

  <div class="app-scroll">
    <div class="px-5 pb-28">

      <!-- 统计概览 — 三栏横排 -->
      <div class="flex gap-3 mt-4">
        <div class="flex-1 bg-ios-card rounded-xl p-4">
          <p class="text-sm text-ios-secondary font-medium">品类</p>
          <p class="text-2xl font-bold text-ios-label mt-1">6</p>
        </div>
        <div class="flex-1 bg-ios-card rounded-xl p-4">
          <p class="text-sm text-ios-secondary font-medium">总件数</p>
          <p class="text-2xl font-bold text-ios-label mt-1">8,560</p>
        </div>
        <div class="flex-1 bg-ios-card rounded-xl p-4">
          <p class="text-sm text-ios-secondary font-medium">总货值</p>
          <p class="text-2xl font-bold text-ios-sea mt-1">128.6<span class="text-sm font-medium">万</span></p>
        </div>
      </div>

      <!-- 品类库存汇总 -->
      <div class="mt-6">
        <h2 class="text-sm font-semibold text-ios-secondary uppercase tracking-wider mb-3 px-1">品类库存汇总</h2>
        <div class="bg-ios-card rounded-xl overflow-hidden">
          <!-- 表头 -->
          <div class="grid grid-cols-12 px-4 py-2.5 bg-ios-gray6 border-b border-ios-gray5">
            <span class="col-span-4 text-sm font-semibold text-ios-secondary">品名</span>
            <span class="col-span-2 text-sm font-semibold text-ios-secondary text-center">件数</span>
            <span class="col-span-2 text-sm font-semibold text-ios-secondary text-center">件重</span>
            <span class="col-span-2 text-sm font-semibold text-ios-secondary text-center">吨数</span>
            <span class="col-span-2 text-sm font-semibold text-ios-secondary text-right">货值</span>
          </div>
          <!-- 数据行 -->
          <a href="batch-detail.html" class="grid grid-cols-12 px-4 py-3.5 border-b border-ios-gray5/60 active:bg-ios-gray6 transition-colors">
            <span class="col-span-4 text-sm font-medium text-ios-label">赤道鱿鱼<br/><span class="text-xs text-ios-tertiary">原条/300-500</span></span>
            <span class="col-span-2 text-sm text-ios-label2 text-center self-center">2,400</span>
            <span class="col-span-2 text-sm text-ios-label2 text-center self-center">10kg</span>
            <span class="col-span-2 text-sm font-semibold text-ios-sea text-center self-center">24.0</span>
            <span class="col-span-2 text-sm font-medium text-ios-sea text-right self-center">28.8万</span>
          </a>
          <a href="batch-detail.html" class="grid grid-cols-12 px-4 py-3.5 border-b border-ios-gray5/60 active:bg-ios-gray6 transition-colors">
            <span class="col-span-4 text-sm font-medium text-ios-label">赤道鱿鱼<br/><span class="text-xs text-ios-tertiary">原条/500-800</span></span>
            <span class="col-span-2 text-sm text-ios-label2 text-center self-center">1,800</span>
            <span class="col-span-2 text-sm text-ios-label2 text-center self-center">15kg</span>
            <span class="col-span-2 text-sm font-semibold text-ios-sea text-center self-center">27.0</span>
            <span class="col-span-2 text-sm font-medium text-ios-sea text-right self-center">32.4万</span>
          </a>
          <a href="batch-detail.html" class="grid grid-cols-12 px-4 py-3.5 border-b border-ios-gray5/60 active:bg-ios-gray6 transition-colors">
            <span class="col-span-4 text-sm font-medium text-ios-label">阿根廷鱿鱼<br/><span class="text-xs text-ios-tertiary">原条/200-300</span></span>
            <span class="col-span-2 text-sm text-ios-label2 text-center self-center">1,200</span>
            <span class="col-span-2 text-sm text-ios-label2 text-center self-center">8kg</span>
            <span class="col-span-2 text-sm font-semibold text-ios-sea text-center self-center">9.6</span>
            <span class="col-span-2 text-sm font-medium text-ios-sea text-right self-center">14.4万</span>
          </a>
          <a href="batch-detail.html" class="grid grid-cols-12 px-4 py-3.5 border-b border-ios-gray5/60 active:bg-ios-gray6 transition-colors">
            <span class="col-span-4 text-sm font-medium text-ios-label">太平洋鲭鱼<br/><span class="text-xs text-ios-tertiary">片冻</span></span>
            <span class="col-span-2 text-sm text-ios-label2 text-center self-center">1,600</span>
            <span class="col-span-2 text-sm text-ios-label2 text-center self-center">6kg</span>
            <span class="col-span-2 text-sm font-semibold text-ios-sea text-center self-center">9.6</span>
            <span class="col-span-2 text-sm font-medium text-ios-sea text-right self-center">19.2万</span>
          </a>
          <a href="batch-detail.html" class="grid grid-cols-12 px-4 py-3.5 border-b border-ios-gray5/60 active:bg-ios-gray6 transition-colors">
            <span class="col-span-4 text-sm font-medium text-ios-label">南美白虾<br/><span class="text-xs text-ios-tertiary">盐冻</span></span>
            <span class="col-span-2 text-sm text-ios-label2 text-center self-center">960</span>
            <span class="col-span-2 text-sm text-ios-label2 text-center self-center">12kg</span>
            <span class="col-span-2 text-sm font-semibold text-ios-sea text-center self-center">11.5</span>
            <span class="col-span-2 text-sm font-medium text-ios-sea text-right self-center">21.6万</span>
          </a>
          <a href="batch-detail.html" class="grid grid-cols-12 px-4 py-3.5 border-b border-ios-gray5/60 active:bg-ios-gray6 transition-colors">
            <span class="col-span-4 text-sm font-medium text-ios-label">北极甜虾<br/><span class="text-xs text-ios-tertiary">熟冻</span></span>
            <span class="col-span-2 text-sm text-ios-label2 text-center self-center">600</span>
            <span class="col-span-2 text-sm text-ios-label2 text-center self-center">5kg</span>
            <span class="col-span-2 text-sm font-semibold text-ios-sea text-center self-center">3.0</span>
            <span class="col-span-2 text-sm font-medium text-ios-sea text-right self-center">12.2万</span>
          </a>
          <!-- 合计行 -->
          <div class="grid grid-cols-12 px-4 py-3 bg-ios-sea/5">
            <span class="col-span-4 text-sm font-bold text-ios-sea">合计</span>
            <span class="col-span-2 text-sm font-bold text-ios-sea text-center self-center">8,560</span>
            <span class="col-span-2 text-sm text-ios-secondary text-center self-center">—</span>
            <span class="col-span-2 text-sm font-bold text-ios-sea text-center self-center">84.7</span>
            <span class="col-span-2 text-sm font-bold text-ios-sea text-right self-center">128.6万</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- 浮动新增按钮 -->
  <div class="absolute right-5 bottom-20 z-50">
    <a href="cargo-edit.html" class="flex items-center justify-center w-14 h-14 rounded-full bg-ios-blue text-white shadow-lg active:scale-95 transition-transform">
      <i data-lucide="plus" class="w-6 h-6"></i>
    </a>
  </div>

  <!-- TabBar -->
  <nav class="shrink-0 flex justify-around items-center h-13 bg-ios-card/80 backdrop-blur-xl border-t border-ios-gray5">
    <a href="home.html" class="flex flex-col items-center gap-0.5 px-3 py-1">
      <i data-lucide="package" class="w-5 h-5 text-ios-blue"></i>
      <span class="text-[10px] font-medium text-ios-blue">货盘</span>
    </a>
    <a href="distribution.html" class="flex flex-col items-center gap-0.5 px-3 py-1">
      <i data-lucide="send" class="w-5 h-5 text-ios-gray"></i>
      <span class="text-[10px] font-medium text-ios-gray">分发</span>
    </a>
    <a href="market.html" class="flex flex-col items-center gap-0.5 px-3 py-1">
      <i data-lucide="trending-up" class="w-5 h-5 text-ios-gray"></i>
      <span class="text-[10px] font-medium text-ios-gray">行情</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center gap-0.5 px-3 py-1">
      <i data-lucide="user" class="w-5 h-5 text-ios-gray"></i>
      <span class="text-[10px] font-medium text-ios-gray">我的</span>
    </a>
  </nav>

</div>
<script>lucide.createIcons();</script>
</body>
</html>
