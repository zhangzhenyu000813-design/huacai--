  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      /* === 品牌色 === */
      --color-primary:              #1a3a5c;
      --color-primary-container:    #d5e3f0;
      --color-on-primary:           #ffffff;
      --color-secondary:            #2db8a0;
      --color-on-secondary:         #ffffff;
      /* === 背景 / 表面 === */
      --color-background:                 #f5f7fa;
      --color-surface-container-lowest:   #ffffff;
      --color-surface:                    #ffffff;
      --color-surface-container:          #eef0f4;
      --color-surface-container-high:     #e5e7eb;
      --color-surface-container-highest:  #d1d5db;
      /* === 文字 === */
      --color-on-surface:           #1a202c;
      --color-on-surface-variant:   #718096;
      /* === 功能色 === */
      --color-success:  #2db8a0;
      --color-error:    #ef4444;
      --color-warning:  #eab308;
      /* === 边框 === */
      --color-outline:          #d1d5db;
      --color-outline-variant:  #e5e7eb;
      /* === 圆角 === */
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.08);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.12);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.18);
      /* === 字体 === */
      --font-sans: system-ui, -apple-system, sans-serif;
    }
  </style>

  <style>
    body {
      min-height: 100dvh;
      font-family: system-ui, sans-serif;
      background: #e8eaed;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
      margin: 0;
    }
    .mobile-frame {
      width: 375px;
      min-height: 100dvh;
      background: var(--color-background);
      position: relative;
      overflow-x: hidden;
    }
    @media (max-width: 420px) {
      body {
        background: var(--color-background);
      }
      .mobile-frame {
        width: 100%;
      }
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>
