<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>单品详情 - 丰链货盘</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    @theme {
      --color-ios-bg: #F2F2F7; --color-ios-card: #FFFFFF;
      --color-ios-blue: #007AFF; --color-ios-green: #34C759; --color-ios-red: #FF3B30;
      --color-ios-orange: #FF9500; --color-ios-yellow: #FFCC00;
      --color-ios-gray: #8E8E93; --color-ios-gray2: #AEAEB2; --color-ios-gray3: #C7C7CC;
      --color-ios-gray4: #D1D1D6; --color-ios-gray5: #E5E5EA; --color-ios-gray6: #F2F2F7;
      --color-ios-sep: #C6C6C8; --color-ios-label: #1C1C1E; --color-ios-label2: #3C3C43;
      --color-ios-secondary: #8E8E93; --color-ios-tertiary: #AEAEB2;
      --color-ios-sea: #1A3A5C; --color-ios-teal-brand: #2DB8A0;
      --font-sans: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    }
  </style>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: var(--font-sans); }
    body { background: #E8E8ED; display: flex; justify-content: center; }
    .mobile-frame { width: 393px; height: 100dvh; background: #F2F2F7; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden; }
    .app-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .app-scroll::-webkit-scrollbar { display: none; }
    @media (max-width: 430px) { body { background: #F2F2F7; } .mobile-frame { width: 100%; } }
  </style>
</head>
<body>
<div class="mobile-frame">

  <header class="shrink-0 bg-ios-bg/90 backdrop-blur-xl">
    <div class="flex items-center px-2 h-11">
      <a href="batch-detail.html" class="flex items-center gap-0.5 text-ios-blue active:opacity-60 px-2 py-1">
        <i data-lucide="chevron-left" class="w-5 h-5"></i>
        <span class="text-base">返回</span>
      </a>
      <div class="flex-1"></div>
    </div>
    <h1 class="text-[28px] font-bold text-ios-label tracking-tight px-5 pb-2">批次详情</h1>
  </header>

  <div class="app-scroll">
    <div class="px-5 pb-28">

      <!-- 批次信息 -->
      <div class="bg-ios-card rounded-xl p-4 mt-3">
        <div class="flex items-center justify-between">
          <p class="text-base font-semibold text-ios-label">批次 #EQ20250101</p>
          <span class="text-sm font-medium text-ios-teal-brand bg-ios-teal-brand/10 px-2.5 py-0.5 rounded-full">品控 A</span>
        </div>
        <div class="flex gap-6 mt-3">
          <div>
            <p class="text-2xl font-bold text-ios-sea">1,200</p>
            <p class="text-sm text-ios-tertiary mt-0.5">件数</p>
          </div>
          <div>
            <p class="text-2xl font-bold text-ios-sea">10<span class="text-sm font-normal">kg</span></p>
            <p class="text-sm text-ios-tertiary mt-0.5">件重</p>
          </div>
          <div>
            <p class="text-2xl font-bold text-ios-sea">12.0<span class="text-sm font-normal">吨</span></p>
            <p class="text-sm text-ios-tertiary mt-0.5">总吨数</p>
          </div>
        </div>
      </div>

      <!-- 属性列表 -->
      <p class="text-sm font-semibold text-ios-secondary uppercase tracking-wider mt-6 mb-2 px-1">货品信息</p>
      <div class="bg-ios-card rounded-xl overflow-hidden">
        <div class="flex items-center justify-between px-4 py-3 border-b border-ios-gray5/60">
          <span class="text-sm text-ios-secondary">产地</span>
          <span class="text-sm text-ios-label">秘鲁海域</span>
        </div>
        <div class="flex items-center justify-between px-4 py-3 border-b border-ios-gray5/60">
          <span class="text-sm text-ios-secondary">冻型</span>
          <span class="text-sm text-ios-label">船冻</span>
        </div>
        <div class="flex items-center justify-between px-4 py-3 border-b border-ios-gray5/60">
          <span class="text-sm text-ios-secondary">捕捞时间</span>
          <span class="text-sm text-ios-label">2025-01-01</span>
        </div>
        <div class="flex items-center justify-between px-4 py-3 border-b border-ios-gray5/60">
          <span class="text-sm text-ios-secondary">存放冷库</span>
          <span class="text-sm text-ios-label">舟山鑫茂冷库</span>
        </div>
        <div class="flex items-center justify-between px-4 py-3 border-b border-ios-gray5/60">
          <span class="text-sm text-ios-secondary">品控评级</span>
          <span class="text-sm font-medium text-ios-teal-brand">A 级</span>
        </div>
        <div class="flex items-center justify-between px-4 py-3 border-b border-ios-gray5/60">
          <span class="text-sm text-ios-secondary">包装方式</span>
          <span class="text-sm text-ios-label">纸箱 10kg/箱</span>
        </div>
        <div class="flex items-center justify-between px-4 py-3">
          <span class="text-sm text-ios-secondary">货值预估</span>
          <span class="text-sm font-semibold text-ios-sea">¥14.4万</span>
        </div>
      </div>

      <!-- 品控档案 -->
      <p class="text-sm font-semibold text-ios-secondary uppercase tracking-wider mt-6 mb-2 px-1">品控档案</p>
      <div class="bg-ios-card rounded-xl p-4">
        <div class="flex items-center gap-2 mb-3">
          <div class="w-8 h-8 rounded-full bg-ios-teal-brand/10 flex items-center justify-center">
            <i data-lucide="shield-check" class="w-4 h-4 text-ios-teal-brand"></i>
          </div>
          <div>
            <p class="text-sm font-medium text-ios-label">李工 · 品控部</p>
            <p class="text-sm text-ios-tertiary">2025-01-03 质检</p>
          </div>
        </div>
        <div class="flex gap-3">
          <div class="flex-1 bg-ios-gray6 rounded-lg p-3 text-center">
            <p class="text-lg font-bold text-ios-sea">9.2</p>
            <p class="text-sm text-ios-tertiary">外观</p>
          </div>
          <div class="flex-1 bg-ios-gray6 rounded-lg p-3 text-center">
            <p class="text-lg font-bold text-ios-sea">9.5</p>
            <p class="text-sm text-ios-tertiary">温度</p>
          </div>
          <div class="flex-1 bg-ios-gray6 rounded-lg p-3 text-center">
            <p class="text-lg font-bold text-ios-sea">9.0</p>
            <p class="text-sm text-ios-tertiary">包装</p>
          </div>
        </div>
        <p class="text-sm text-ios-secondary mt-3 leading-relaxed">品质优良，冻品温度合规，包装完整无破损。建议优先分发。</p>
        <!-- 品控照片 -->
        <div class="flex gap-2 mt-3">
          <div class="w-20 h-20 rounded-lg bg-ios-gray6 flex items-center justify-center text-ios-tertiary text-sm">品控 1</div>
          <div class="w-20 h-20 rounded-lg bg-ios-gray6 flex items-center justify-center text-ios-tertiary text-sm">品控 2</div>
          <div class="w-20 h-20 rounded-lg bg-ios-gray6 flex items-center justify-center text-ios-tertiary text-sm">品控 3</div>
        </div>
      </div>

      <!-- 浏览统计 -->
      <div class="bg-ios-card rounded-xl p-4 mt-4">
        <div class="flex items-center justify-between">
          <div class="flex gap-4">
            <div class="text-center">
              <p class="text-lg font-bold text-ios-sea">128</p>
              <p class="text-sm text-ios-tertiary">浏览</p>
            </div>
            <div class="text-center">
              <p class="text-lg font-bold text-ios-sea">5</p>
              <p class="text-sm text-ios-tertiary">看货</p>
            </div>
            <div class="text-center">
              <p class="text-lg font-bold text-ios-sea">2</p>
              <p class="text-sm text-ios-tertiary">合作</p>
            </div>
          </div>
          <a class="text-sm text-ios-blue">浏览记录 →</a>
        </div>
      </div>

    </div>
  </div>

  <!-- 底部操作栏 -->
  <div class="shrink-0 flex gap-3 px-5 py-3 bg-ios-card/90 backdrop-blur-xl border-t border-ios-gray5">
    <a href="cargo-edit.html" class="flex-1 h-11 rounded-xl border border-ios-blue text-ios-blue font-semibold text-base flex items-center justify-center active:bg-ios-blue/10">编辑</a>
    <a href="new-distribution.html" class="flex-1 h-11 rounded-xl bg-ios-blue text-white font-semibold text-base flex items-center justify-center active:bg-ios-blue/80">分发</a>
  </div>

</div>
<script>lucide.createIcons();</script>
</body>
</html>
