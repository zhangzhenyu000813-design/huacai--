<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>货盘录入 - 丰链货盘</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    @theme {
      --color-ios-bg: #F2F2F7; --color-ios-card: #FFFFFF;
      --color-ios-blue: #007AFF; --color-ios-green: #34C759; --color-ios-red: #FF3B30;
      --color-ios-orange: #FF9500; --color-ios-yellow: #FFCC00;
      --color-ios-gray: #8E8E93; --color-ios-gray2: #AEAEB2; --color-ios-gray3: #C7C7CC;
      --color-ios-gray4: #D1D1D6; --color-ios-gray5: #E5E5EA; --color-ios-gray6: #F2F2F7;
      --color-ios-sep: #C6C6C8; --color-ios-label: #1C1C1E; --color-ios-label2: #3C3C43;
      --color-ios-secondary: #8E8E93; --color-ios-tertiary: #AEAEB2;
      --color-ios-sea: #1A3A5C; --color-ios-teal-brand: #2DB8A0;
      --font-sans: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    }
  </style>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: var(--font-sans); }
    body { background: #E8E8ED; display: flex; justify-content: center; }
    .mobile-frame { width: 393px; height: 100dvh; background: #F2F2F7; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden; }
    .app-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .app-scroll::-webkit-scrollbar { display: none; }
    input, select, textarea { font-family: var(--font-sans); font-size: 16px; }
    @media (max-width: 430px) { body { background: #F2F2F7; } .mobile-frame { width: 100%; } }
  </style>
</head>
<body>
<div class="mobile-frame">

  <header class="shrink-0 bg-ios-bg/90 backdrop-blur-xl">
    <div class="flex items-center justify-between px-5 h-11">
      <a href="home.html" class="flex items-center gap-0.5 text-ios-blue active:opacity-60 -ml-2 px-2 py-1">
        <i data-lucide="x" class="w-5 h-5"></i>
      </a>
      <span class="text-base font-semibold text-ios-label">新增货盘</span>
      <span class="w-10"></span>
    </div>
  </header>

  <div class="app-scroll">
    <div class="px-5 pb-28">

      <!-- 品类选择 -->
      <p class="text-sm font-semibold text-ios-secondary uppercase tracking-wider mt-4 mb-2 px-1">品类信息</p>
      <div class="bg-ios-card rounded-xl overflow-hidden">
        <div class="flex items-center justify-between px-4 py-3 border-b border-ios-gray5/60 active:bg-ios-gray6">
          <span class="text-sm text-ios-secondary">品类</span>
          <div class="flex items-center gap-1">
            <span class="text-sm text-ios-label">赤道鱿鱼</span>
            <i data-lucide="chevron-right" class="w-4 h-4 text-ios-gray3"></i>
          </div>
        </div>
        <div class="flex items-center justify-between px-4 py-3 active:bg-ios-gray6">
          <span class="text-sm text-ios-secondary">规格</span>
          <div class="flex items-center gap-1">
            <span class="text-sm text-ios-label">300-500g</span>
            <i data-lucide="chevron-right" class="w-4 h-4 text-ios-gray3"></i>
          </div>
        </div>
      </div>

      <!-- 批次信息 -->
      <p class="text-sm font-semibold text-ios-secondary uppercase tracking-wider mt-6 mb-2 px-1">批次信息</p>
      <div class="bg-ios-card rounded-xl overflow-hidden">
        <div class="flex items-center justify-between px-4 py-3 border-b border-ios-gray5/60">
          <span class="text-sm text-ios-secondary">批次号</span>
          <input type="text" placeholder="自动生成" class="text-sm text-right text-ios-label placeholder:text-ios-gray3 outline-none bg-transparent" style="width: 160px;" value="EQ20250120" />
        </div>
        <div class="flex items-center justify-between px-4 py-3 border-b border-ios-gray5/60">
          <span class="text-sm text-ios-secondary">件数</span>
          <input type="number" placeholder="输入件数" class="text-sm text-right text-ios-label placeholder:text-ios-gray3 outline-none bg-transparent" style="width: 160px;" value="600" />
        </div>
        <div class="flex items-center justify-between px-4 py-3 border-b border-ios-gray5/60">
          <span class="text-sm text-ios-secondary">件重 (kg)</span>
          <input type="number" placeholder="输入件重" class="text-sm text-right text-ios-label placeholder:text-ios-gray3 outline-none bg-transparent" style="width: 160px;" value="10" />
        </div>
        <div class="flex items-center justify-between px-4 py-3">
          <span class="text-sm text-ios-secondary">货值预估 (万元)</span>
          <input type="number" placeholder="输入货值" class="text-sm text-right text-ios-label placeholder:text-ios-gray3 outline-none bg-transparent" style="width: 160px;" value="7.2" />
        </div>
      </div>

      <!-- 货品属性 -->
      <p class="text-sm font-semibold text-ios-secondary uppercase tracking-wider mt-6 mb-2 px-1">货品属性</p>
      <div class="bg-ios-card rounded-xl overflow-hidden">
        <div class="flex items-center justify-between px-4 py-3 border-b border-ios-gray5/60 active:bg-ios-gray6">
          <span class="text-sm text-ios-secondary">产地</span>
          <div class="flex items-center gap-1">
            <span class="text-sm text-ios-label">秘鲁海域</span>
            <i data-lucide="chevron-right" class="w-4 h-4 text-ios-gray3"></i>
          </div>
        </div>
        <div class="flex items-center justify-between px-4 py-3 border-b border-ios-gray5/60 active:bg-ios-gray6">
          <span class="text-sm text-ios-secondary">冻型</span>
          <div class="flex items-center gap-1">
            <span class="text-sm text-ios-label">船冻</span>
            <i data-lucide="chevron-right" class="w-4 h-4 text-ios-gray3"></i>
          </div>
        </div>
        <div class="flex items-center justify-between px-4 py-3 border-b border-ios-gray5/60">
          <span class="text-sm text-ios-secondary">捕捞时间</span>
          <input type="date" class="text-sm text-right text-ios-label outline-none bg-transparent" style="width: 160px;" value="2025-01-15" />
        </div>
        <div class="flex items-center justify-between px-4 py-3 border-b border-ios-gray5/60 active:bg-ios-gray6">
          <span class="text-sm text-ios-secondary">存放冷库</span>
          <div class="flex items-center gap-1">
            <span class="text-sm text-ios-label">舟山鑫茂</span>
            <i data-lucide="chevron-right" class="w-4 h-4 text-ios-gray3"></i>
          </div>
        </div>
        <div class="flex items-center justify-between px-4 py-3 active:bg-ios-gray6">
          <span class="text-sm text-ios-secondary">包装方式</span>
          <div class="flex items-center gap-1">
            <span class="text-sm text-ios-label">纸箱 10kg/箱</span>
            <i data-lucide="chevron-right" class="w-4 h-4 text-ios-gray3"></i>
          </div>
        </div>
      </div>

      <!-- 品控提示 -->
      <div class="bg-ios-orange/10 rounded-xl p-4 mt-6">
        <div class="flex items-start gap-2">
          <i data-lucide="clock" class="w-4 h-4 text-ios-orange mt-0.5 shrink-0"></i>
          <div>
            <p class="text-sm font-medium text-ios-orange">品控待检</p>
            <p class="text-sm text-ios-secondary mt-1 leading-relaxed">保存后货盘将进入品控待检状态，品控团队将前往冷库进行实地质检，上传评级与品控报告后即可分发。预计48小时内完成上门质检。</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- 底部保存按钮 -->
  <div class="shrink-0 px-5 py-3 bg-ios-card/90 backdrop-blur-xl border-t border-ios-gray5">
    <button class="w-full h-11 rounded-xl bg-ios-blue text-white font-semibold text-base active:bg-ios-blue/80" onclick="alert('货盘保存成功！品控团队将在48小时内上门质检。')">保存</button>
  </div>

</div>
<script>lucide.createIcons();</script>
</body>
</html>
