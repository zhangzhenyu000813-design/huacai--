<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>批次明细 - 丰链货盘</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    @theme {
      --color-ios-bg: #F2F2F7; --color-ios-card: #FFFFFF;
      --color-ios-blue: #007AFF; --color-ios-green: #34C759; --color-ios-red: #FF3B30;
      --color-ios-orange: #FF9500; --color-ios-yellow: #FFCC00;
      --color-ios-gray: #8E8E93; --color-ios-gray2: #AEAEB2; --color-ios-gray3: #C7C7CC;
      --color-ios-gray4: #D1D1D6; --color-ios-gray5: #E5E5EA; --color-ios-gray6: #F2F2F7;
      --color-ios-sep: #C6C6C8; --color-ios-label: #1C1C1E; --color-ios-label2: #3C3C43;
      --color-ios-secondary: #8E8E93; --color-ios-tertiary: #AEAEB2;
      --color-ios-sea: #1A3A5C; --color-ios-teal-brand: #2DB8A0;
      --font-sans: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    }
  </style>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: var(--font-sans); }
    body { background: #E8E8ED; display: flex; justify-content: center; }
    .mobile-frame { width: 393px; height: 100dvh; background: #F2F2F7; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden; }
    .app-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .app-scroll::-webkit-scrollbar { display: none; }
    @media (max-width: 430px) { body { background: #F2F2F7; } .mobile-frame { width: 100%; } }
  </style>
</head>
<body>
<div class="mobile-frame">

  <!-- 顶部导航栏 -->
  <header class="shrink-0 bg-ios-bg/90 backdrop-blur-xl">
    <div class="flex items-center px-2 h-11">
      <a href="home.html" class="flex items-center gap-0.5 text-ios-blue active:opacity-60 px-2 py-1">
        <i data-lucide="chevron-left" class="w-5 h-5"></i>
        <span class="text-base">返回</span>
      </a>
      <div class="flex-1"></div>
    </div>
    <h1 class="text-[28px] font-bold text-ios-label tracking-tight px-5 pb-2">赤道鱿鱼 原条</h1>
  </header>

  <div class="app-scroll">
    <div class="px-5 pb-6">

      <!-- 品类信息卡 -->
      <div class="bg-ios-card rounded-xl p-4 mt-3">
        <p class="text-sm text-ios-secondary">规格 300-500g</p>
        <div class="flex gap-6 mt-3">
          <div>
            <p class="text-2xl font-bold text-ios-sea">2,400</p>
            <p class="text-sm text-ios-tertiary mt-0.5">总件数</p>
          </div>
          <div>
            <p class="text-2xl font-bold text-ios-sea">24.0</p>
            <p class="text-sm text-ios-tertiary mt-0.5">总吨数</p>
          </div>
          <div>
            <p class="text-2xl font-bold text-ios-sea">¥28.8<span class="text-sm font-normal">万</span></p>
            <p class="text-sm text-ios-tertiary mt-0.5">货值</p>
          </div>
        </div>
      </div>

      <!-- 批次列表 -->
      <p class="text-sm font-semibold text-ios-secondary uppercase tracking-wider mt-6 mb-2 px-1">批次明细</p>
      <div class="bg-ios-card rounded-xl overflow-hidden">
        <a href="product-detail.html" class="flex items-center justify-between px-4 py-3.5 border-b border-ios-gray5/60 active:bg-ios-gray6">
          <div>
            <p class="text-base font-medium text-ios-label">批次 #EQ20250101</p>
            <p class="text-sm text-ios-secondary mt-0.5">1,200件 · 10kg/件 · 12.0吨</p>
          </div>
          <div class="text-right">
            <p class="text-sm font-semibold text-ios-sea">¥14.4万</p>
            <p class="text-sm text-ios-tertiary">舟山鑫茂</p>
          </div>
        </a>
        <a href="product-detail.html" class="flex items-center justify-between px-4 py-3.5 border-b border-ios-gray5/60 active:bg-ios-gray6">
          <div>
            <p class="text-base font-medium text-ios-label">批次 #EQ20250108</p>
            <p class="text-sm text-ios-secondary mt-0.5">800件 · 10kg/件 · 8.0吨</p>
          </div>
          <div class="text-right">
            <p class="text-sm font-semibold text-ios-sea">¥9.6万</p>
            <p class="text-sm text-ios-tertiary">宁波远洋</p>
          </div>
        </a>
        <a href="product-detail.html" class="flex items-center justify-between px-4 py-3.5 active:bg-ios-gray6">
          <div>
            <p class="text-base font-medium text-ios-label">批次 #EQ20250112</p>
            <p class="text-sm text-ios-secondary mt-0.5">400件 · 10kg/件 · 4.0吨</p>
          </div>
          <div class="text-right">
            <p class="text-sm font-semibold text-ios-sea">¥4.8万</p>
            <p class="text-sm text-ios-tertiary">大连獐子岛</p>
          </div>
        </a>
      </div>

    </div>
  </div>

</div>
<script>lucide.createIcons();</script>
</body>
</html>
